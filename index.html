<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idle Farm</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
      <main class="scene">
      <div class="grid-overlay"></div>
      <section id="workspace" class="workspace">
        <div id="cell-mount" class="cell-mount"></div>
        <div id="market-mount" class="cell-mount"></div>
        <div id="sell-market-mount" class="cell-mount"></div>
        <div id="money-mount" class="cell-mount"></div>
        <div id="shopping-mount" class="cell-mount"></div>
        <div id="barn-mount" class="cell-mount"></div>
        <div id="build-mount" class="cell-mount"></div>
        <div id="mill-mount" class="cell-mount"></div>
        <div id="bakery-mount" class="cell-mount"></div>
        <div id="animal-pen-mount" class="cell-mount"></div>
        <div id="menu-mount" class="cell-mount"></div>
        <div id="tools-mount" class="cell-mount"></div>
      </section>
      <div class="farm-controls">
        <button type="button" class="restart-farm" data-restart-farm>Restart farm</button>
        <div class="delete-zone" data-delete-zone>Delete</div>
      </div>
      <div id="status" class="status"></div>
    </main>
  </body>
</html>
